<!DOCTYPE html>
<html>
<head>
<title>Projects</title>
<style>

body{
  font-family:Arial;
  margin:0;
  background:#f1f5f9;
}

/* container */
.container{
  padding:40px 20px;
  text-align:center;
}

/* back button */
.back{
  text-decoration:none;
  background:#0f172a;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  position:absolute;
  left:20px;
  top:20px;
}

/* title */
.title{
  font-size:32px;
  margin-top:40px;
  margin-bottom:30px;
}

/* project list */
.project-list{
  max-width:500px;
  margin:0 auto;
  background:white;
  padding:30px;
  border-radius:14px;
  box-shadow:0 8px 22px rgba(0,0,0,0.08);
  text-align:left;
}

/* clickable project */
.project-link{
  display:block;
  font-size:18px;
  padding:12px 10px;
  text-decoration:none;
  color:#1e3a8a;
  font-weight:500;
  border-radius:8px;
  transition:.25s;
}

.project-link:hover{
  background:#eef2ff;
  padding-left:18px;
}

</style>
</head>
<body>

<a class="back" href="index.html">← Back</a>

<div class="container">
  <h2 class="title">My Projects</h2>

  <div class="project-list">
    <a class="project-link" href="project1.html">
      1. Smart Watering System
    </a>
  </div>
</div>

</body>
</html>
