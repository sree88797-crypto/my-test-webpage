<!DOCTYPE html>
<html>
<head>
<title>Projects</title>

<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:#f1f5f9;
}

/* back button */
.back{
  position:absolute;
  left:20px;
  top:20px;
  text-decoration:none;
  background:#0f172a;
  color:white;
  padding:8px 14px;
  border-radius:6px;
}

/* center wrapper */
.wrapper{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* title */
.title{
  font-size:32px;
  margin-bottom:30px;
}

/* project box */
.project-box{
  background:white;
  padding:30px 40px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  width:320px;
}

/* clickable project name */
.project-link{
  display:block;
  font-size:18px;
  text-decoration:none;
  color:#1e3a8a;
  font-weight:600;
  padding:12px;
  border-radius:8px;
  transition:0.25s;
}

.project-link:hover{
  background:#eef2ff;
  transform:translateX(6px);
}
</style>
</head>

<body>

<a class="back" href="index.html">← Back</a>

<div class="wrapper">
  <h2 class="title">My Projects</h2>

  <div class="project-box">
    <a class="project-link" href="project1.html">
      1. Smart Watering System
    </a>
  </div>
</div>

</body>
</html>
