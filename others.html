<!DOCTYPE html>
<html>
<head>

<title>Gas Sensor Live Updates</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#f4f7fb;
text-align:center;
padding:40px;
}

h1{
color:#1e3a8a;
}

.container{
width:85%;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<h1>Gas Sensor Live Updates</h1>

<div class="container">
<canvas id="gasChart"></canvas>
</div>

<script>

const channelID = "3289446";
const readAPI = "E43XWBWZDGC14PD8";

const url = `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPI}&results=20`;

async function loadChart(){

const response = await fetch(url);
const data = await response.json();

let labels = [];
let values = [];

data.feeds.forEach(feed => {

let utcTime = new Date(feed.created_at);

let indianTime = utcTime.toLocaleString("en-IN", {
timeZone: "Asia/Kolkata",
year: "numeric",
month: "short",
day: "numeric",
hour: "2-digit",
minute: "2-digit",
second: "2-digit"
});

labels.push(indianTime);
values.push(feed.field1);

});

const ctx = document.getElementById('gasChart').getContext('2d');

new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:[{
label:'Gas Sensor Value',
data:values,
borderWidth:3,
fill:false
}]
},
options:{
responsive:true,
scales:{
x:{
ticks:{
maxRotation:90,
minRotation:45
}
}
}
}
});

}

loadChart();

setInterval(loadChart,15000);

</script>

</body>
</html>
